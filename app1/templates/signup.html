<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Karan's Web App | Sign Up</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
            width: 350px;
            border: 1px solid #ddd;
        }

        h2 { text-align: center; color: #333; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        
        label { display: block; font-size: 14px; color: #555; margin-bottom: 5px; font-weight: 600; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.2); }

        .error-text { color: #dc3545; font-size: 12px; margin-top: 5px; font-weight: 500; }
        .success-text { color: #28a745; font-size: 14px; text-align: center; margin-bottom: 15px; }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #0056b3; }

        .login-link { text-align: center; margin-top: 15px; font-size: 13px; color: #666; }
        .login-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        @media (max-width: 480px) {
    .form-container, .login-container, .dashboard-container {
        width: 90%;
        padding: 20px;
    }
}

    </style>
</head>
<body>

<div class="form-container">
    <h2>Create Account</h2>

    {% if success %}
        <p class="success-text">{{ success }}</p>
    {% endif %}

    <form action="" method="POST">
        {% csrf_token %}
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" value="{{u}}" placeholder="Username">
            {% if msg_username %}<p class="error-text">{{ msg_username }}</p>{% endif %}
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Password" value="{{p}}">
            {% if msg_pwd %}<p class="error-text">{{ msg_pwd }}</p>{% endif %}
        </div>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="text" name="mobile" value="{{m}}" placeholder="10-digit number">
            {% if msg_m %}<p class="error-text">{{ msg_m }}</p>{% endif %}
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="text" name="email" value="{{e}}" placeholder="example@gmail.com">
            {% if msg_email %}<p class="error-text">{{ msg_email }}</p>{% endif %}
        </div>

        <button type="submit">Sign Up</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login/">Log In</a>
    </div>
</div>

</body>
</html>
