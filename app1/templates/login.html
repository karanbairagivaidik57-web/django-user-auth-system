<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karan's Web App | Login In</title>

    <style>
        /* 1. Base Setup (Signup jaisa hi hai) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 2. Login Card */
        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 25px; font-size: 24px; }

        /* 3. Form Styles */
        .input-group { margin-bottom: 20px; text-align: left; }
        
        label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 600; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.2); }

        /* 4. Error/Success Messages */
        .error-text { color: #dc3545; font-size: 13px; margin-top: 10px; font-weight: 500; }
        .success-text { color: #28a745; font-size: 14px; margin-bottom: 15px; }

        /* 5. Button Style */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background-color: #0056b3; }

        /* 6. Signup Link */
        .signup-link { margin-top: 20px; font-size: 14px; color: #666; }
        .signup-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        @media (max-width: 480px) {
    .form-container, .login-container, .dashboard-container {
        width: 90%;
        padding: 20px;
    }
}

    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>

    {% if success %}
        <p class="success-text">{{ success }}</p>
    {% endif %}

    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" value="{{u}}" placeholder="Enter Username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password">
        </div>

        <button type="submit">Log In</button>

        {% if msg %}
            <p class="error-text">{{ msg }}</p>
        {% endif %}
    </form>

    <div class="signup-link">
        Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
    </div>
</div>

</body>
</html>
